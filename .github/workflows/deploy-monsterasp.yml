name: Deploy to MonsterASP.NET

on:
  push:
    branches:
      - main
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: deploy-monsterasp-main
  cancel-in-progress: true

jobs:
  deploy:
    name: Build, test and deploy
    runs-on: windows-latest

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up .NET 10 SDK
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: 10.0.x

      - name: Restore dependencies
        run: dotnet restore Aleexnl.Library.Management.slnx

      - name: Build solution
        run: dotnet build Aleexnl.Library.Management.slnx --configuration Release --no-restore

      - name: Run tests
        run: dotnet test Aleexnl.Library.Management.slnx --configuration Release --no-build

      - name: Restore Web API for deployment runtime
        run: >
          dotnet restore src/Aleexnl.Library.Management.WebAPI/Aleexnl.Library.Management.WebAPI.csproj
          --runtime win-x86

      - name: Publish Web API
        run: >
          dotnet publish src/Aleexnl.Library.Management.WebAPI/Aleexnl.Library.Management.WebAPI.csproj
          --configuration Release
          --no-restore
          --output "${{ github.workspace }}\\publish"
          --runtime win-x86
          --self-contained false

      - name: Deploy to MonsterASP.NET via Web Deploy
        uses: rasmusbuchholdt/simply-web-deploy@2.2.0
        with:
          website-name: ${{ secrets.WEBSITE_NAME }}
          server-computer-name: ${{ secrets.SERVER_COMPUTER_NAME }}
          server-username: ${{ secrets.SERVER_USERNAME }}
          server-password: ${{ secrets.SERVER_PASSWORD }}
          source-path: '\publish\'
