name: Test and Coverage

on:
  pull_request:
  push:
    branches:
      - main

permissions:
  contents: read

jobs:
  test-and-coverage:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: 10.0.x

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.x"

      - name: Restore
        run: dotnet restore Aleexnl.Library.Management.slnx

      - name: Test with coverage
        run: dotnet test Aleexnl.Library.Management.slnx --no-restore --collect:"XPlat Code Coverage;Format=cobertura" --results-directory artifacts/test-results

      - name: Resolve comparison range
        id: range
        shell: bash
        run: |
          if [[ "${{ github.event_name }}" == "pull_request" ]]; then
            echo "base_sha=${{ github.event.pull_request.base.sha }}" >> "$GITHUB_OUTPUT"
          else
            echo "base_sha=${{ github.event.before }}" >> "$GITHUB_OUTPUT"
          fi
          echo "head_sha=${GITHUB_SHA}" >> "$GITHUB_OUTPUT"

      - name: Enforce new-code coverage > 80%
        if: steps.range.outputs.base_sha != '0000000000000000000000000000000000000000'
        run: |
          python3 scripts/check_new_code_coverage.py \
            --base-sha "${{ steps.range.outputs.base_sha }}" \
            --head-sha "${{ steps.range.outputs.head_sha }}" \
            --coverage-glob "artifacts/test-results/**/coverage.cobertura.xml" \
            --threshold 80
